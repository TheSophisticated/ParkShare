            <a href="#" class="block py-2.5 px-4 rounded hover:bg-indigo-600">

            <button class="w-full text-left py-2 px-4 hover:text-red-300">

            </button>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">

        <h1 class="text-2xl font-bold text-gray-800 mb-6">Settings</h1>

        <!-- Profile Settings -->
        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <h2 class="font-bold text-gray-700 mb-4">Profile Information</h2>

            <input id="username" type="text" placeholder="Username"
                class="w-full border p-2 rounded mb-3">

            <input id="email" type="email" placeholder="Email"
                class="w-full border p-2 rounded mb-3">

            <button onclick="saveProfile()"
                class="bg-indigo-600 text-white px-4 py-2 rounded">
                Save Changes
            </button>
        </div>

        <!-- Password Change -->
        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <h2 class="font-bold text-gray-700 mb-4">Change Password</h2>

            <input type="password" id="oldPassword" placeholder="Old Password"
                class="w-full border p-2 rounded mb-3">

            <input type="password" id="newPassword" placeholder="New Password"
                class="w-full border p-2 rounded mb-3">

            <button onclick="changePassword()"
                class="bg-indigo-600 text-white px-4 py-2 rounded">
                Update Password
            </button>
        </div>

        <!-- Danger Zone -->
        <div class="bg-white p-6 rounded-xl shadow-sm border">
            <h2 class="font-bold text-red-600 mb-4">Danger Zone</h2>

            <button onclick="deleteAccount()"
                class="bg-red-600 text-white px-4 py-2 rounded">
                Delete Account
            </button>
        </div>

    </main>
</div>

function deleteAccount(){
    if(confirm("Are you sure?")){

// load user
async function loadUserSettings(){
  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("email").value = user.email;

  const name = user.user_metadata?.display_name;

  if(name){
    document.getElementById("username").value = name;
  }
}



loadUserSettings();

async function saveProfile(){
  const name = document.getElementById("username").value;
  const email = document.getElementById("email").value;

  const { data, error } = await supabase.auth.updateUser({
    email: email,
    data: { display_name: name }
  });

  if(error){
    alert(error.message);
  } else {
    localStorage.setItem("username", name);
    alert("Profile updated successfully!");
  }
}

</script>
