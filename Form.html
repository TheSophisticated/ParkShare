<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Parking Space</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        #map{
            height: 400px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .required{
            color:red;
        }
        .card {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 6px;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section h3 {
            margin-bottom: 12px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        /* Upload Box */
        .upload-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 150px;
            border: 2px dashed #c7d2fe;
            padding: 24px;
            text-align: center;
            border-radius: 12px;
            color: #4f46e5;
            cursor: pointer;
            box-sizing: border-box;
            position: relative; /* Needed for absolute positioning of remove button */
        }

        .upload-box:hover {
            background: #eef2ff;
        }

        .upload-text {
            font-weight: 600;
            display: block;
        }

        .upload-subtext {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
        }

        .upload-box input {
            display: none;
        }

        /* Preview Image Styling */
        #preview-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
        }

        /* Remove Button Styling */
        #remove-img-btn {
            display: none;
            margin-top: 10px;
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        #remove-img-btn:hover {
            background: #dc2626;
        }

        .submit-btn{
            background-color:rgb(0, 191, 255);
            cursor: pointer;
            color: white;
            font-weight: 700;
        }

    </style>
</head>

<body>

    <div class = "heading">
        <div class = "logo"><a href="index.html">ParkShare</a></div>

        <div class ="booking_renting">
            <div class = "bookOption"><img src = "images/booking.png" class = "image_br"><a href="listing.html">Book</a></div>
            <div class = "rentOption"> <img src = "images/rent_r.png" class = "image_br"><a href="rentPage.html" style="color: purple;">Rent</a> </div>
        </div>

        <div class="login">
            <img src = "images/profile.png" class = "image_br" ><a href="login.html" id="login-link">Login/Signup</a>
        </div>
    </div>

<div class="card" id="main-form">
    <h1>Park Share</h1>
    <p>Please fill out the following requirements to list your parking space</p>

    <form id="parking-form">

        <div class="section">
            <h3>Owner Details</h3>
            <label >Owner Name<span class="">*</span></label>
            <input type="text" placeholder="Full name" id="renter-name">
        </div>

        <div class="section">
            <h3>Address Details</h3>

            <label>Address Line 1</label>
            <input type="text" placeholder="Flat/House No., Building, Street Name" id="street">

            <label>Address Line 2</label>
            <input type="text" placeholder="Landmark, Area, State" id="appt">

            <label>City</label>
            <input type="text" placeholder="City" id="city">

            <label>Pincode</label>
            <input type="text" placeholder="Pincode" id="pincode">
            <input type="button" value="Find Location" id="find-location" class="submit-btn">
            <div id="map"></div>
            <input type="hidden" id="lat-input">
            <input type="hidden" id="lon-input">
        </div>

        <div class="section">
            <h3>Parking Details</h3>

            <label>Vehicle Type</label>
            <select id="vehicle-type">
                <option value="">Select Parking Space</option>
                <option value="4-wheeler">4 Wheeler</option>
                <option value="2-wheeler">2 Wheeler</option>
                <option value="Heavy Vehicle">Heavy Vehicle</option>
            </select>

            <label>Price (per day)</label>
            <input type="number" placeholder="Enter price" id="rate">
        </div>

        <div class="section">
            <h3>Upload Parking Image</h3>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <label class="upload-box" id="upload-label" for="img-file">
                    <img id="preview-img" src="" alt="Preview">
                    <div id="upload-prompt">
                        <span class="upload-text">Click to upload image</span>
                        <span class="upload-subtext">PNG, JPG up to 5MB</span>
                    </div>
                    <input id="img-file" type="file" accept="image/*" required>
                </label>
                <button type="button" id="remove-img-btn">Remove Image</button>
            </div>
        </div>

        <input type="submit" value="Submit" class="submit-btn">
    </form>
</div>

<2 type="module" src="AddParking.js"></script>
<script type="module" src="auth.js"></script>

<script>
    const fileInput = document.getElementById('img-file');
    const previewImg = document.getElementById('preview-img');
    const uploadPrompt = document.getElementById('upload-prompt');
    const removeBtn = document.getElementById('remove-img-btn');

    // Handle Image Selection
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                uploadPrompt.style.display = 'none';
                removeBtn.style.display = 'block'; // Show remove button
            }
            
            reader.readAsDataURL(file);
        }
    });

    // Handle Image Removal
    removeBtn.addEventListener('click', function() {
        fileInput.value = ""; // Clear the file input
        previewImg.src = "";
        previewImg.style.display = 'none';
        uploadPrompt.style.display = 'block';
        removeBtn.style.display = 'none'; // Hide remove button
    });
</script>

</body>
</html>
