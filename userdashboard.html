<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ParkShare | User Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-50 font-[Inter]">

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-64 bg-gradient-to-b from-purple-600 to-purple-500 text-white hidden md:flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-purple-400">
<i class="fas fa-parking mr-2"></i>ParkShare
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="#" class="block py-2.5 px-4 rounded-lg bg-purple-700 shadow">
<i class="fas fa-home mr-2"></i>Dashboard
</a>

<a href="listing.html" class="block py-2.5 px-4 rounded-lg hover:bg-purple-500 transition">
<i class="fas fa-search mr-2"></i>Find Parking
</a>

<a href="#" class="block py-2.5 px-4 rounded-lg hover:bg-purple-500 transition">
<i class="fas fa-history mr-2"></i>My Bookings
</a>

<a href="settings.html" class="block py-2.5 px-4 rounded-lg hover:bg-purple-500 transition">
<i class="fas fa-user-cog mr-2"></i>Settings
</a>

</nav>

<div class="p-4 border-t border-purple-400">
<button onclick="logout()" class="w-full text-left py-2 px-4 hover:text-red-300">
<i class="fas fa-sign-out-alt mr-2"></i>Logout
</button>
</div>

</aside>

<!-- MAIN -->
<main class="flex-1 overflow-y-auto">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur-md border-b border-gray-200 py-4 px-8 flex justify-between items-center">
<h1 id="welcomeText" class="text-xl font-semibold text-gray-800">
Welcome back!
</h1>
<span class="text-sm text-gray-500">Member since 2026</span>
</header>

<!-- CONTENT -->
<div class="p-8">

<!-- CARDS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

<div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
<p class="text-gray-500 text-sm font-semibold">ACTIVE BOOKING</p>
<h2 class="text-2xl font-bold text-purple-600 mt-1">Spot #402</h2>
<p id="parkingTimer" class="text-sm text-green-500 mt-2 font-semibold">Loading...</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
<p class="text-gray-500 text-sm font-semibold">WALLET BALANCE</p>
<h2 id="walletBalance" class="text-2xl font-bold text-gray-800 mt-1">₹0</h2>
<p class="text-sm text-purple-600 mt-2 hover:underline cursor-pointer">Add funds →</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
<p class="text-gray-500 text-sm font-semibold">REVIEWS & RATINGS</p>
<h2 id="avgRating" class="text-2xl font-bold text-yellow-500 mt-1">⭐ 0.0</h2>
<p id="totalReviews" class="text-sm text-gray-400 mt-2">0 reviews</p>

<a href="reviewsystem.html" class="mt-3 inline-block text-sm text-purple-600 hover:underline">
Add Review →
</a>
</div>

</div>

<!-- HISTORY -->
<div class="bg-white rounded-2xl shadow-md">

<div class="p-6 border-b border-gray-100 flex justify-between items-center">
<h3 class="font-semibold text-gray-800">Recent History</h3>
<button class="text-purple-600 text-sm font-semibold hover:text-purple-800">
View All
</button>
</div>

<div class="overflow-x-auto">
<table class="w-full text-left">

<thead class="bg-gray-50">
<tr>
<th class="px-6 py-3 text-xs text-gray-500 uppercase">Location</th>
<th class="px-6 py-3 text-xs text-gray-500 uppercase">Date</th>
<th class="px-6 py-3 text-xs text-gray-500 uppercase">Duration</th>
<th class="px-6 py-3 text-xs text-gray-500 uppercase">Cost</th>
<th class="px-6 py-3 text-xs text-gray-500 uppercase">Status</th>
</tr>
</thead>

<tbody id="historyTable" class="divide-y divide-gray-100">
</tbody>

</table>
</div>

</div>

</div>

</main>
</div>

<!-- SCRIPT -->
<script>

const SUPABASE_URL = "https://wbtzkgpkcigqaecdjlbn.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function logout(){
  await client.auth.signOut();
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

async function loadBookings(){
    const { data } = await client.from("bookings").select("*");
    const table = document.getElementById("historyTable");
    if(!data) return;

    table.innerHTML = "";
    data.forEach(b => {
        table.innerHTML += `
        <tr>
            <td class="px-6 py-4 font-medium">${b.parking_id}</td>
            <td class="px-6 py-4 text-gray-600 text-sm">${b.booking_time}</td>
            <td class="px-6 py-4 text-gray-600 text-sm">3 Hours</td>
            <td class="px-6 py-4 font-semibold">₹${b.amount}</td>
            <td class="px-6 py-4 text-green-600 font-semibold">Completed</td>
        </tr>`;
    });
}

function loadUserHeader(){
  let name = localStorage.getItem("username") || "User";
  document.getElementById("welcomeText").innerText = "Welcome back, " + name;
}

async function loadWallet(){
  const { data } = await client.from("wallet").select("Balance").eq("username","Rohan Patri").single();
  if(data){
    document.getElementById("walletBalance").innerText = "₹" + data.Balance;
  }
}

async function loadActiveBooking(){
  const { data } = await client.from("bookings")
    .select("booking_time,duration")
    .order("booking_time",{ascending:false})
    .limit(1)
    .single();

  if(!data){
    document.getElementById("parkingTimer").innerText = "No active booking";
    return;
  }

  startCountdown(data.booking_time, data.duration);
}

function startCountdown(startTime, duration){
  const start = new Date(startTime);
  const end = new Date(start.getTime() + duration*3600000);

  function update(){
    const now = new Date();
    const diff = end - now;

    if(diff <= 0){
      document.getElementById("parkingTimer").innerText = "Parking expired";
      return;
    }

    const m = Math.floor(diff/60000);
    const s = Math.floor((diff%60000)/1000);

    document.getElementById("parkingTimer").innerText = `Ends in ${m}m ${s}s`;
  }

  update();
  setInterval(update,1000);
}

loadBookings();
loadUserHeader();
loadWallet();
loadActiveBooking();

</script>

</body>
</html>
