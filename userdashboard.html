<!-- SCRIPT -->
<script>

const SUPABASE_URL = "https://wbtzkgpkcigqaecdjlbn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidHprZ3BrY2lncWFlY2RqbGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2NDk2MTgsImV4cCI6MjA4MjIyNTYxOH0.4ZZO81-Uwdvjjvd_GR-aNyqrgT15XOJhSMAzp8LsPv8";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function logout(){
  await client.auth.signOut();
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

async function loadBookings(){

    const table = document.getElementById("historyTable");

    // 🔑 Get logged-in user
    const { data: { user } } = await client.auth.getUser();

    if(!user){
        table.innerHTML = `
        <tr>
            <td colspan="5" class="text-center py-6 text-gray-400">
                Please login
            </td>
        </tr>`;
        return;
    }

    // 🔥 Fetch only THIS user's bookings
    const { data, error } = await client
        .from("bookings")
        .select("*")
        .eq("user_id", user.id)
        .order("date", { ascending: false });

    console.log("User bookings:", data);

    if(error || !data || data.length === 0){
        table.innerHTML = `
        <tr>
            <td colspan="5" class="text-center py-6 text-gray-400">
                No booking history found
            </td>
        </tr>`;
        return;
    }

    table.innerHTML = "";

    data.forEach(b => {
        table.innerHTML += `
        <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 font-medium">#${b.parking_id}</td>
            <td class="px-6 py-4 text-sm">${b.date}</td>
            <td class="px-6 py-4 text-sm">${b.time_slot}</td>
            <td class="px-6 py-4 font-semibold">₹${b.amount || 59}</td>
            <td class="px-6 py-4 text-green-600 font-semibold">Completed</td>
        </tr>`;
    });
}

function loadUserHeader(){
  let name = localStorage.getItem("username") || "User";
  document.getElementById("welcomeText").innerText = "Welcome back, " + name;
}

async function loadWallet(){
  const { data } = await client.from("wallet").select("Balance").eq("username","Rohan Patri").single();
  if(data){
    document.getElementById("walletBalance").innerText = "₹" + data.Balance;
  }
}

async function loadActiveBooking(){

  const { data: { user } } = await client.auth.getUser();

  if(!user){
    document.getElementById("activeSpot").innerText = "No booking";
    document.getElementById("parkingTimer").innerText = "Login required";
    return;
  }

  const { data, error } = await client
    .from("bookings")
    .select("*")
    .eq("user_id", user.id)
    .order("date", { ascending: false })
    .limit(1);

  console.log("Active booking:", data);

  if(error || !data || data.length === 0){
    document.getElementById("activeSpot").innerText = "No booking";
    document.getElementById("parkingTimer").innerText = "No active booking";
    return;
  }

  const booking = data[0];

  // 🔥 Update UI dynamically
  document.getElementById("activeSpot").innerText =
    "Spot #" + booking.parking_id.slice(0,6)

}

function startCountdown(startTime, duration){
  const start = new Date(startTime);
  const end = new Date(start.getTime() + duration*3600000);

  function update(){
    const now = new Date();
    const diff = end - now;

    if(diff <= 0){
      document.getElementById("parkingTimer").innerText = "Parking expired";
      return;
    }

    const m = Math.floor(diff/60000);
    const s = Math.floor((diff%60000)/1000);

    document.getElementById("parkingTimer").innerText = `Ends in ${m}m ${s}s`;
  }

  update();
  setInterval(update,1000);
}

loadBookings();
loadUserHeader();
loadWallet();
loadActiveBooking();

</script>
