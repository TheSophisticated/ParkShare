<!DOCTYPE html>
<html>
<head>
    <title>CampusPay</title>
    <link rel="stylesheet" href="payment.css">

    <style>
        .review-btn{
            background: #555;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }
    
        .review-btn:hover{
            background: purple;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="background-blur"></div>

<div class="card">
    <div class="logo"><span>Payment</span></div>

    <div class="amount-box">
        <label>Amount</label>
        <div class="input-wrapper">
            <span class="rupee">₹</span>
            <input type="number" id="amountInput" placeholder="0.00">
        </div>
    </div>

    <div class="methods">
        <p class="method-title">Choose Payment Method</p>

        <div class="method-option">
            <input type="radio" name="method" id="upi" checked>
            <label for="upi">
                <div class="method-name">UPI</div>
                <div class="method-desc">Pay via Google Pay, PhonePe, Paytm</div>
            </label>
        </div>

        <div class="method-option">
            <input type="radio" name="method" id="card">
            <label for="card">
                <div class="method-name">Card</div>
                <div class="method-desc">Visa, Mastercard, RuPay</div>
            </label>
        </div>
    </div>

    <button class="pay-btn" id="payBtn">Pay Securely</button>
    <!-- <button type="button" class="review-btn" id="reviewBtn">
            Leave a Review
    </button> -->

    <div class="secure-note">
    </div>
</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const uuid = params.get("id");

        const reviewBtn = document.getElementById("reviewBtn");

        reviewBtn.addEventListener("click", () => {
            if (uuid) {
                const reviewUrl = `https://thesophisticated.github.io/ParkShare/reviewsystem.html?uuid=${uuid}`;
                window.open(reviewUrl, "_blank");
            } 
            else {
                alert("No ID found in URL");
            }
        });
    </script>
<script src="script.js"></script>

</body>
</html>
