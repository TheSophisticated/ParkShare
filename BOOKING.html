<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    <link rel="stylesheet" href="bookstyle.css">
</head>
<body>

<div class="booking-container">
    <div class="info-panel">
        <div class="image-placeholder">
            <img src="https://via.placeholder.com/400x250" alt="Parking Space">
        </div>
        <div class="info-content">
            <p class="category">PARKING SPACE</p>
            <h1>NIT Warangal-Country Oven</h1>
            <p class="price"><strong>$150.00</strong> / 60 min</p>
            <p class="tagline">Experience safety and security</p>
            <ul class="features">
                <li>✓ Protected parking space</li>
                <li>✓ Camera security</li>
                <li>✓ Insurance</li>
            </ul>
        </div>
    </div>

    <div class="form-panel">
        <h2>Complete Your Booking</h2>
        <p class="subtitle">Select a date and time that works for you.</p>

        <form action="#">
            <div class="input-group">
                <label>Select Date</label>
                <input type="date" placeholder="dd-mm-yyyy">
            </div>

            <div class="time-slots">
                <label>Available Times</label>
                <div class="slots-grid">
                    <button type="button" class="slot">09:00 AM - 10:00 AM</button>
                    <button type="button" class="slot">10:30 AM - 11:30 AM</button>
                    <button type="button" class="slot">01:00 PM - 05:00 PM</button>
                    <button type="button" class="slot">07:00 PM - 10:00 PM</button>
                </div>
            </div>

            <div class="name-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="jane@example.com">
            </div>

            <button type="submit" class="submit-btn">Confirm Booking & Pay</button>
        </form>
    </div>
</div>

</body>
</html>
